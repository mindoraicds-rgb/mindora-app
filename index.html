<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Mindora · Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#3D1A4F; --purple:#6C3483; --violet:#8E44AD; --lilac:#B589C9;
  --teal:#0F6E56; --gold:#C9A961;
  --bg:#FAF8FC; --card:#FFFFFF; --ink:#2A2330; --muted:#6B6475; --line:#ECE6F0;
  --ok:#0F6E56; --warn:#B45309; --danger:#B23A48;
  --shadow:0 1px 2px rgba(61,26,79,.04),0 8px 24px rgba(61,26,79,.06);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3,.disp{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--purple)}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
#login{min-height:100%;display:grid;place-items:center;padding:24px;
  background:radial-gradient(1200px 600px at 70% -10%,rgba(142,68,173,.25),transparent 60%),
             radial-gradient(900px 500px at -10% 110%,rgba(15,110,86,.18),transparent 55%),
             linear-gradient(160deg,#2A1138,#3D1A4F 55%,#4A2160)}
.login-card{width:100%;max-width:400px;background:var(--card);border-radius:24px;padding:36px 30px;box-shadow:0 30px 80px rgba(20,8,30,.45)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.mark{width:42px;height:42px;flex:none}
.brand-name{font-family:'Fraunces';font-weight:600;font-size:24px;color:var(--plum);line-height:1}
.brand-sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-top:3px}
.login-card h1{font-size:22px;margin:22px 0 4px;color:var(--ink)}
.login-card p.lead{color:var(--muted);font-size:14px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:#FCFBFD;transition:border-color .15s,box-shadow .15s}
.field input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 4px rgba(142,68,173,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;font-weight:600;font-size:15px;transition:transform .08s,filter .15s,background .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--purple),var(--violet));color:#fff;box-shadow:0 8px 20px rgba(108,52,131,.3)}
.btn-primary:hover{filter:brightness(1.06)}
.btn-primary[disabled]{opacity:.6;cursor:default}
.msg{font-size:13.5px;padding:10px 12px;border-radius:10px;margin-bottom:14px;display:none}
.msg.show{display:block}
.msg.err{background:#FBEAEC;color:var(--danger)}
.msg.ok{background:#E7F3EE;color:var(--ok)}
.login-foot{margin-top:18px;text-align:center;font-size:12px;color:var(--muted)}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100%}
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:linear-gradient(185deg,var(--plum),#34173F);color:#EFE7F3;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-top{padding:22px 20px 14px;display:flex;align-items:center;gap:11px}
.side-top .brand-name{color:#fff;font-size:20px}
.side-top .brand-sub{margin-top:2px}
.nav{padding:10px 12px;flex:1;overflow-y:auto}
.nav-label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:14px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:rgba(255,255,255,.82);font-weight:500;font-size:14.5px;width:100%;text-align:left;transition:background .14s,color .14s}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.13);color:#fff}
.nav-item svg{width:19px;height:19px;flex:none;opacity:.9}
.nav-item .badge{margin-left:auto;background:var(--gold);color:#3a2a00;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
.side-foot{padding:14px;border-top:1px solid rgba(255,255,255,.1)}
.who{display:flex;align-items:center;gap:11px;padding:6px 8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--lilac));display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;flex:none}
.who-name{font-size:13.5px;font-weight:600;color:#fff;line-height:1.2}
.who-role{font-size:11px;color:rgba(255,255,255,.55);text-transform:capitalize}
.signout{margin-top:8px;width:100%;color:rgba(255,255,255,.7);font-size:13px;padding:9px;border-radius:10px;display:flex;align-items:center;gap:9px;justify-content:center}
.signout:hover{background:rgba(255,255,255,.08);color:#fff}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--line);background:rgba(250,248,252,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
.menu-btn{display:none;width:40px;height:40px;border-radius:11px;border:1.5px solid var(--line);background:#fff;align-items:center;justify-content:center}
.topbar .crumb{font-size:12.5px;color:var(--muted);font-weight:500}
.topbar h2{font-size:19px;color:var(--ink);line-height:1.15}
.topbar .date{margin-left:auto;font-size:13px;color:var(--muted);font-weight:500}
.content{padding:26px 28px 60px;max-width:1100px;width:100%}

/* welcome */
.welcome{background:linear-gradient(120deg,#fff,#F7F0FA);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;box-shadow:var(--shadow);position:relative;overflow:hidden;margin-bottom:22px}
.welcome::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,97,.22),transparent 70%)}
.welcome h1{font-size:26px;color:var(--plum);margin-bottom:4px}
.welcome p{color:var(--muted);font-size:14.5px;max-width:60ch}

/* stat cards */
.grid{display:grid;gap:16px}
.stats{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:22px}
.stat{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent,var(--violet));border-radius:14px;padding:18px 18px 16px;box-shadow:var(--shadow)}
.stat .n{font-family:'Fraunces';font-size:32px;font-weight:600;color:var(--ink);line-height:1}
.stat .l{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:8px}
.stat .s{font-size:12.5px;color:var(--muted);margin-top:3px}

.section-head{display:flex;align-items:center;gap:12px;margin:8px 0 16px}
.section-head h3{font-size:18px;color:var(--ink)}
.section-head .btn{margin-left:auto}
.btn-sm{padding:9px 15px;font-size:14px;border-radius:11px}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--lilac)}

/* search */
.searchbar{display:flex;gap:10px;margin-bottom:16px}
.searchbar input{flex:1;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff}
.searchbar input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 4px rgba(142,68,173,.1)}

/* list cards */
.rows{display:flex;flex-direction:column;gap:10px}
.row-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:border-color .14s,transform .08s;cursor:pointer}
.row-card:hover{border-color:var(--lilac)}
.row-card:active{transform:scale(.997)}
.row-ava{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#EFE2F6,#F6EEDA);display:grid;place-items:center;font-weight:700;color:var(--purple);flex:none;font-size:15px}
.row-main{min-width:0;flex:1}
.row-name{font-weight:600;font-size:15.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.pill.active{background:#E7F3EE;color:var(--ok)}
.pill.enquiry,.pill.intake{background:#FDF3E3;color:var(--warn)}
.pill.assessment{background:#EEE8F7;color:var(--purple)}
.pill.on_hold,.pill.exited{background:#F1EEF3;color:var(--muted)}
.pill.band{background:#F3ECDA;color:#8a6d1f}

/* empty / loading */
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .e-mark{width:54px;height:54px;margin:0 auto 14px;opacity:.5}
.empty h4{font-family:'Fraunces';font-size:19px;color:var(--ink);margin-bottom:5px}
.empty p{font-size:14px;margin-bottom:18px}
.loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:14px;padding:30px 4px}
.spin{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--violet);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.coming{background:var(--card);border:1px dashed var(--lilac);border-radius:var(--radius);padding:40px 28px;text-align:center;box-shadow:var(--shadow)}
.coming h3{font-size:20px;color:var(--plum);margin-bottom:8px}
.coming p{color:var(--muted);max-width:48ch;margin:0 auto;font-size:14.5px}

/* finance snapshot */
.fin-grid{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:8px}
.fin{background:linear-gradient(135deg,#fff,#F6F1FA);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.fin .l{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600}
.fin .n{font-family:'Fraunces';font-size:23px;color:var(--ink);margin-top:6px}
.fin.pos .n{color:var(--teal)} .fin.due .n{color:var(--warn)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(40,18,55,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:60}
.modal-bg.show{display:flex}
.modal{background:#fff;width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;padding:24px 22px 30px;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.modal h3{font-size:20px;color:var(--plum);margin-bottom:3px}
.modal .sub{color:var(--muted);font-size:13.5px;margin-bottom:18px}
.form-row{margin-bottom:13px}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:#FCFBFD}
.form-row textarea{resize:vertical;min-height:64px}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 4px rgba(142,68,173,.1)}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}

/* toast */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:500;opacity:0;transition:.25s;z-index:90;box-shadow:0 10px 30px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.bad{background:var(--danger)}

@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;width:264px;z-index:50;transform:translateX(-100%);transition:transform .25s}
  .side.open{transform:none}
  .scrim{position:fixed;inset:0;background:rgba(40,18,55,.45);z-index:45;display:none}
  .scrim.show{display:block}
  .menu-btn{display:flex}
  .topbar .date{display:none}
  .content{padding:20px 16px 70px}
  .modal{max-width:none}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="15" r="9" fill="#8E44AD"/>
        <circle cx="16" cy="30" r="9" fill="#6C3483"/>
        <circle cx="32" cy="30" r="9" fill="#B589C9"/>
        <circle cx="24" cy="25" r="6.5" fill="#C9A961"/>
      </svg>
      <div>
        <div class="brand-name">Mindora</div>
        <div class="brand-sub">Home · Hope · Harmony</div>
      </div>
    </div>
    <h1>Welcome back</h1>
    <p class="lead">Sign in to the Mindora operations workspace.</p>
    <div id="loginMsg" class="msg"></div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" placeholder="you@mindoraicds.com" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required/>
      </div>
      <button class="btn btn-primary" id="loginBtn" type="submit">Sign in</button>
    </form>
    <div class="login-foot">Mindora Inclusive Child Development Services</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="shell">
    <div class="scrim" id="scrim"></div>
    <aside class="side" id="side">
      <div class="side-top">
        <svg class="mark" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="15" r="9" fill="#8E44AD"/><circle cx="16" cy="30" r="9" fill="#6C3483"/><circle cx="32" cy="30" r="9" fill="#B589C9"/><circle cx="24" cy="25" r="6.5" fill="#C9A961"/></svg>
        <div><div class="brand-name">Mindora</div><div class="brand-sub">Operations</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot">
        <div class="who">
          <div class="avatar" id="avatar">M</div>
          <div><div class="who-name" id="whoName">—</div><div class="who-role" id="whoRole">—</div></div>
        </div>
        <button class="signout" id="signout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Sign out
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="menu-btn" id="menuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3D1A4F" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div>
          <div class="crumb">Mindora Operations</div>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="date" id="todayDate"></div>
      </div>
      <div class="content" id="view"></div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===================== CONFIG ===================== */
const SUPABASE_URL = 'https://uaaowqwptfzjmngmluow.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YFNFxqpBNwlqU5QYd8LdcA_euOkXzHt';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== ICONS ===================== */
const I = {
  dash:'<path d="M3 13h8V3H3zM13 21h8V3h-8zM3 21h8v-6H3z"/>',
  child:'<circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/>',
  prof:'<path d="M16 21v-2a4 4 0 0 0-8 0v2"/><circle cx="12" cy="7" r="4"/>',
  inst:'<path d="M3 21h18M5 21V8l7-4 7 4v13M9 21v-5h6v5"/>',
  assign:'<path d="M9 11l3 3 8-8M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  fin:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  set:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4 13.6H4a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 5 6.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 4.6V4a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a2 2 0 0 1 0 4h-.1z"/>'
};
const icon = k => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${I[k]}</svg>`;

/* ===================== NAV BY ROLE ===================== */
const NAV = {
  staff:[
    {k:'dashboard',label:'Dashboard',icon:'dash'},
    {k:'clients',label:'Children',icon:'child'},
    {k:'professionals',label:'Professionals',icon:'prof'},
    {k:'institutions',label:'Institutions',icon:'inst'},
    {k:'assignments',label:'Assignments',icon:'assign'},
    {k:'finances',label:'Finances',icon:'fin',directorOnly:true},
    {k:'reports',label:'Reports',icon:'fin',directorOnly:true},
    {k:'access',label:'People & access',icon:'prof',directorOnly:true},
    {k:'settings',label:'Settings',icon:'set',directorOnly:true},
  ],
  professional:[
    {k:'pro_requests',label:'Requests',icon:'assign'},
    {k:'pro_children',label:'My children',icon:'child'},
  ]
};

/* ===================== STATE ===================== */
let ME={id:null,name:'',role:null};
let currentView='dashboard';
let MY_PROF_ID=null;
let SELECTED_CHILD=null;

/* ===================== HELPERS ===================== */
const $=s=>document.querySelector(s);
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
function toast(m,bad){const t=$('#toast');t.textContent=m;t.className=bad?'bad show':'show';setTimeout(()=>t.className='',2600);}
function initials(n){return (n||'M').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function money(n){return 'UGX '+Number(n||0).toLocaleString();}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ===================== AUTH ===================== */
$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'); const msg=$('#loginMsg');
  msg.className='msg';
  btn.disabled=true; btn.textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#password').value});
  if(error){ msg.textContent=error.message.includes('Invalid')?'That email or password is not right. Try again.':error.message; msg.className='msg err show'; btn.disabled=false; btn.textContent='Sign in'; return; }
  await boot();
});

$('#signout').addEventListener('click',async()=>{ await sb.auth.signOut(); location.reload(); });

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ $('#login').classList.remove('hidden'); $('#app').style.display='none'; return; }
  // load profile
  const {data:prof,error}=await sb.from('profiles').select('full_name,role').eq('id',session.user.id).single();
  if(error||!prof){ toast('Could not load your profile.',true); return; }
  ME={id:session.user.id,name:prof.full_name||session.user.email,role:prof.role};
  // If not staff, try to link a professional record created for this email
  if(!['director','secretary'].includes(ME.role)){
    await sb.rpc('claim_professional_profile');
    const {data:p2}=await sb.from('profiles').select('full_name,role').eq('id',session.user.id).single();
    if(p2){ ME.role=p2.role; ME.name=p2.full_name||ME.name; }
  }
  MY_PROF_ID=null;
  if(ME.role==='professional'){
    const {data:pr}=await sb.from('professionals').select('id').eq('profile_id',ME.id).maybeSingle();
    MY_PROF_ID=pr?pr.id:null;
  }

const isStaff=()=>['director','secretary'].includes(ME.role);

/* ===================== NAV ===================== */
function buildNav(){
  const nav=$('#nav'); nav.innerHTML='';
  if(isStaff()){
    nav.appendChild(el(`<div class="nav-label">Workspace</div>`));
    NAV.staff.forEach(item=>{
      if(item.directorOnly && !isDirector()) return;
      const b=el(`<button class="nav-item" data-k="${item.k}">${icon(item.icon)}<span>${item.label}</span></button>`);
      b.addEventListener('click',()=>{go(item.k);closeSide();});
      nav.appendChild(b);
    });
  } else if(ME.role==='professional'){
    nav.appendChild(el(`<div class="nav-label">My work</div>`));
    NAV.professional.forEach(item=>{
      const b=el(`<button class="nav-item" data-k="${item.k}">${icon(item.icon)}<span>${item.label}</span></button>`);
      b.addEventListener('click',()=>{go(item.k);closeSide();});
      nav.appendChild(b);
    });
  }
  updateBadges();
}
function setBadge(k,n){
  const item=document.querySelector(`.nav-item[data-k="${k}"]`); if(!item)return;
  let b=item.querySelector('.badge');
  if(n>0){ if(!b){b=el('<span class="badge"></span>');item.appendChild(b);} b.textContent=n; }
  else if(b){ b.remove(); }
}
async function updateBadges(){
  if(isStaff()){
    const {count}=await sb.from('assignments').select('*',{count:'exact',head:true}).eq('status','pending');
    setBadge('assignments',count||0);
  } else if(ME.role==='professional'){
    const {count}=await sb.from('assignments').select('*',{count:'exact',head:true}).eq('status','pending');
    setBadge('pro_requests',count||0);
  }
}
function setActiveNav(){document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.k===currentView));}
$('#menuBtn').addEventListener('click',()=>{ $('#side').classList.add('open'); $('#scrim').classList.add('show'); });
function closeSide(){ $('#side').classList.remove('open'); $('#scrim').classList.remove('show'); }

function txnForm(t,preset){
  t=t||null; preset=preset||null; const edit=!!t;
  const today=new Date().toISOString().slice(0,10);
  const sel=(val,opt)=>val===opt?'selected':'';
  const initDir = edit ? t.direction : (preset?preset.direction:'in');
  const initAcct = edit ? t.account_code : (preset?preset.account_code:'');
  // derive starting tax state for edit (rate back-computed from stored amounts)
  const g0 = edit ? Number(t.gross_amount||0) : 0;
  const vat0 = edit ? Number(t.vat_amount||0) : 0;
  const wht0 = edit ? Number(t.wht_amount||0) : 0;
  const vrate0 = (edit && g0>0 && vat0>0) ? +(vat0/g0*100).toFixed(2) : 18;
  const wrate0 = (edit && g0>0 && wht0>0) ? +(wht0/g0*100).toFixed(2) : 6;
  const m=el(`<div class="modal-bg show"><div class="modal">
    <h3>${edit?'Edit transaction':'Record money in / out'}</h3><div class="sub">Enter it once — it updates every book automatically.</div>
    <div class="form-row two">
      <div><label>Type</label><select id="t_dir"><option value="in" ${sel(initDir,'in')}>Money in (receipt)</option><option value="out" ${sel(initDir,'out')}>Money out (payment)</option></select></div>
      <div><label>Date</label><input id="t_date" type="date" value="${edit?(t.txn_date||today):today}"/></div>
    </div>
    <div class="form-row"><label>Account (category)</label><select id="t_acct">${acctOptions(null,initAcct)}</select></div>
    <div class="form-row two">
      <div><label>Amount (UGX)</label><input id="t_amt" type="number" value="${edit?(t.gross_amount??''):''}" placeholder="0"/></div>
      <div><label>Channel</label><select id="t_chan"><option ${edit&&sel(t.channel,'cash')}>cash</option><option ${edit&&sel(t.channel,'bank')}>bank</option><option ${edit&&sel(t.channel,'mobile money')}>mobile money</option></select></div>
    </div>
    <div class="form-row" style="background:#FAF7FC;border:1px solid var(--line);border-radius:12px;padding:12px">
      <label style="margin-bottom:8px">Taxes — tick what applies</label>
      <label style="display:flex;gap:8px;align-items:center"><input type="checkbox" id="t_vat_on" ${vat0>0?'checked':''} style="width:auto"/> VAT&nbsp; <input id="t_vat_rate" type="number" step="0.1" value="${vrate0}" style="width:74px;padding:6px"/> %</label>
      <label style="display:flex;gap:8px;align-items:center;margin-top:6px;font-size:13px;color:var(--muted)"><input type="checkbox" id="t_vat_incl" style="width:auto"/> Amount already includes VAT</label>
      <label style="display:flex;gap:8px;align-items:center;margin-top:8px"><input type="checkbox" id="t_wht_on" ${wht0>0?'checked':''} style="width:auto"/> WHT&nbsp; <input id="t_wht_rate" type="number" step="0.1" value="${wrate0}" style="width:74px;padding:6px"/> %</label>
      <div id="t_taxprev" class="row-sub" style="margin-top:10px;line-height:1.6"></div>
    </div>
    <div class="form-row"><label>Who / party</label><input id="t_party" value="${edit?escapeHtml(t.party||''):''}" placeholder="Who paid you / who you paid"/></div>
    <div class="form-row"><label>Description</label><input id="t_desc" value="${edit?escapeHtml(t.description||''):''}"/></div>
    <div class="form-row"><label>Reference (optional)</label><input id="t_ref" value="${edit?escapeHtml(t.reference||''):''}" placeholder="receipt / voucher no."/></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="t_cancel">Cancel</button><button class="btn btn-primary" id="t_save">${edit?'Save changes':'Save'}</button></div>
    ${edit?'<button class="btn" id="t_del" style="width:100%;margin-top:10px;color:var(--danger)">Delete this transaction</button>':''}
  </div></div>`);
  document.body.appendChild(m);
  const $$=id=>m.querySelector(id);
  const calc=()=>{
    const gEntered=parseFloat($$('#t_amt').value)||0;
    const vatOn=$$('#t_vat_on').checked, incl=$$('#t_vat_incl').checked;
    const vrate=parseFloat($$('#t_vat_rate').value)||0;
    let base=gEntered, vat=0;
    if(vatOn){
      if(incl){ vat=Math.round(gEntered - gEntered/(1+vrate/100)); base=gEntered-vat; }
      else { base=gEntered; vat=Math.round(base*vrate/100); }
    }
    const wht=$$('#t_wht_on').checked?Math.round(base*(parseFloat($$('#t_wht_rate').value)||0)/100):0;
    const dir=$$('#t_dir').value;
    const cash=base+vat-wht;
    let lines=[];
    if(vatOn) lines.push(`Value before VAT: <b>${money(base)}</b>`);
    if(vat) lines.push(`VAT ${dir==='in'?'collected (→ VAT payable)':'paid (→ VAT recoverable)'}: <b>${money(vat)}</b>`);
    if(wht) lines.push(`WHT ${dir==='in'?'withheld from you (→ WHT receivable)':'you withhold (→ WHT payable)'}: <b>${money(wht)}</b>`);
    lines.push(`Actual cash ${dir==='in'?'received':'paid'}: <b>${money(cash)}</b>`);
    $$('#t_taxprev').innerHTML=lines.join('<br>');
    return {vat,wht,base};
  };
  const suggest=()=>{ // pre-tick from the account's tax tags (only for new entries)
    if(edit||preset)return;
    const a=ACCOUNTS.find(x=>x.code===$$('#t_acct').value);
    if(a){ $$('#t_vat_on').checked=(a.tax_treatment==='standard'); $$('#t_wht_on').checked=!!a.wht_applicable; }
    calc();
  };
  ['#t_amt','#t_vat_rate','#t_wht_rate'].forEach(id=>$$(id).addEventListener('input',calc));
  ['#t_vat_on','#t_wht_on','#t_dir','#t_vat_incl'].forEach(id=>$$(id).addEventListener('change',calc));
  $$('#t_acct').addEventListener('change',suggest);
  suggest(); calc();
  const close=()=>m.remove(); m.addEventListener('click',e=>{if(e.target===m)close();});
  $$('#t_cancel').onclick=close;
  if(edit){ $$('#t_del').onclick=async()=>{ if(!confirm('Delete this transaction permanently?'))return; const {error}=await sb.from('transactions').delete().eq('id',t.id); if(error){toast(error.message,true);return;} toast('Transaction deleted'); close(); renderFinances($('#view')); }; }
  $$('#t_save').onclick=async()=>{
    const amt=parseFloat($$('#t_amt').value);
    if(!amt||amt<=0){toast('Enter an amount.',true);return;}
    const {vat,wht,base}=calc();
    const btn=$$('#t_save');btn.disabled=true;btn.textContent='Saving…';
    const payload={
      txn_date:$$('#t_date').value||today,
      direction:$$('#t_dir').value,
      account_code:$$('#t_acct').value,
      gross_amount:base, vat_amount:vat, wht_amount:wht,
      channel:$$('#t_chan').value,
      party:$$('#t_party').value.trim()||null,
      description:$$('#t_desc').value.trim()||null,
      reference:$$('#t_ref').value.trim()||null
    };
    let error;
    if(edit){ ({error}=await sb.from('transactions').update(payload).eq('id',t.id)); }
    else { payload.created_by=ME.id; ({error}=await sb.from('transactions').insert(payload)); }
    if(error){toast(error.message,true);btn.disabled=false;btn.textContent=edit?'Save changes':'Save';return;}
    toast(edit?'Transaction updated':'Recorded'); close(); renderFinances($('#view'));
  };
}

function reportRange(){
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth(); let from,to;
  if(REPORT_PERIOD==='month'){from=new Date(y,mo,1);to=new Date(y,mo+1,0);}
  else if(REPORT_PERIOD==='quarter'){const q=Math.floor(mo/3);from=new Date(y,q*3,1);to=new Date(y,q*3+3,0);}
  else if(REPORT_PERIOD==='fy'){const sY=(mo>=3)?y:y-1;from=new Date(sY,3,1);to=new Date(sY+1,2,31);}
  else if(REPORT_PERIOD==='custom'){from=new Date(($('#rfrom')&&$('#rfrom').value)||'2000-01-01');to=new Date(($('#rto')&&$('#rto').value)||now);}
  else {from=new Date(2000,0,1);to=now;}
  return {fromS:isoD(from),toS:isoD(to)};
}
const accType=c=>{const a=ACCOUNTS.find(x=>x.code===c);return a?a.type:'';};
const accNm=c=>{const a=ACCOUNTS.find(x=>x.code===c);return a?a.name:(c||'');};
const cashOf=t=>Number(t.gross_amount||0)+Number(t.vat_amount||0)-Number(t.wht_amount||0);
async function renderReports(v){
  if(!isDirector()){v.innerHTML=`<div class="coming"><h3>Reports</h3><p>Director only.</p></div>`;return;}
  await loadAccounts();
  { const {data}=await sb.from('transactions').select('*').order('txn_date'); ALLTXNS=data||[]; }
  v.innerHTML=`
   <div class="searchbar" style="flex-wrap:wrap;gap:8px">
     ${[['pnl','Profit & Loss'],['cash','Cash Flow'],['tax','Tax Summary']].map(([k,l])=>`<button class="btn ${REPORT_TYPE===k?'btn-primary':'btn-ghost'} btn-sm rtab" data-t="${k}" style="width:auto">${l}</button>`).join('')}
   </div>
   <div class="searchbar" style="flex-wrap:wrap;gap:8px;margin-top:8px">
     <select id="rperiod" style="padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;background:#fff">
       <option value="month">This month</option><option value="quarter">This quarter</option>
       <option value="fy">Financial year</option><option value="all">All time</option><option value="custom">Custom…</option>
     </select>
     <input id="rfrom" type="date" style="display:none;padding:8px;border:1.5px solid var(--line);border-radius:10px"/>
     <input id="rto" type="date" style="display:none;padding:8px;border:1.5px solid var(--line);border-radius:10px"/>
     <button class="btn btn-ghost btn-sm" id="rprint" style="width:auto">Print / Save PDF</button>
     <button class="btn btn-ghost btn-sm" id="rcsv" style="width:auto">Download CSV</button>
   </div>
   <div id="reportBody" style="margin-top:16px"></div>`;
  $('#rperiod').value=REPORT_PERIOD;
  const c=REPORT_PERIOD==='custom'; $('#rfrom').style.display=c?'':'none'; $('#rto').style.display=c?'':'none';
  $('#rperiod').onchange=()=>{REPORT_PERIOD=$('#rperiod').value;const cc=REPORT_PERIOD==='custom';$('#rfrom').style.display=cc?'':'none';$('#rto').style.display=cc?'':'none';drawReport();};
  $('#rfrom').onchange=drawReport; $('#rto').onchange=drawReport;
  document.querySelectorAll('.rtab').forEach(b=>b.onclick=()=>{REPORT_TYPE=b.dataset.t;renderReports($('#view'));});
  $('#rprint').onclick=printReport; $('#rcsv').onclick=()=>downloadCSV(LAST_TITLE.replace(/\s+/g,'_')+'.csv',LAST_CSV);
  drawReport();
}
function rowsToTable(rows){ // rows: [{label, value, bold, head}]
  return `<table style="width:100%;border-collapse:collapse">`+rows.map(r=>{
    if(r.head) return `<tr><td colspan="2" style="padding:12px 4px 4px;font-weight:700;color:var(--purple)">${escapeHtml(r.label)}</td></tr>`;
    return `<tr><td style="padding:7px 4px;border-bottom:1px solid #eee;${r.bold?'font-weight:700;border-top:2px solid #333':''}">${escapeHtml(r.label)}</td>
    <td style="padding:7px 4px;border-bottom:1px solid #eee;text-align:right;${r.bold?'font-weight:700;border-top:2px solid #333':''}">${r.value==null?'':money(r.value)}</td></tr>`;
  }).join('')+`</table>`;
}
function drawReport(){
  const {fromS,toS}=reportRange();
  const inRange=ALLTXNS.filter(t=>t.txn_date>=fromS && t.txn_date<=toS);
  LAST_PERIOD=`${fmtDate(fromS)} — ${fmtDate(toS)}`;
  let rows=[], csv=[['Mindora',REPORT_TYPE.toUpperCase(),LAST_PERIOD],[]];
  if(REPORT_TYPE==='pnl'){
    LAST_TITLE='Mindora Profit and Loss';
    const inc={}, exp={};
    inRange.forEach(t=>{const ty=accType(t.account_code);const g=Number(t.gross_amount||0);
      if(ty==='income') inc[t.account_code]=(inc[t.account_code]||0)+g;
      else if(ty==='expense') exp[t.account_code]=(exp[t.account_code]||0)+g;});
    const incT=Object.values(inc).reduce((a,b)=>a+b,0), expT=Object.values(exp).reduce((a,b)=>a+b,0);
    rows.push({head:true,label:'INCOME'}); csv.push(['INCOME']);
    Object.keys(inc).sort().forEach(c=>{rows.push({label:accNm(c),value:inc[c]});csv.push([accNm(c),inc[c]]);});
    rows.push({label:'Total income',value:incT,bold:true}); csv.push(['Total income',incT],[]);
    rows.push({head:true,label:'EXPENSES'}); csv.push(['EXPENSES']);
    Object.keys(exp).sort().forEach(c=>{rows.push({label:accNm(c),value:exp[c]});csv.push([accNm(c),exp[c]]);});
    rows.push({label:'Total expenses',value:expT,bold:true}); csv.push(['Total expenses',expT],[]);
    rows.push({label:'NET PROFIT / (LOSS)',value:incT-expT,bold:true}); csv.push(['NET PROFIT/(LOSS)',incT-expT]);
  } else if(REPORT_TYPE==='cash'){
    LAST_TITLE='Mindora Cash Flow';
    const opening=ALLTXNS.filter(t=>t.txn_date<fromS).reduce((a,t)=>a+(t.direction==='in'?cashOf(t):-cashOf(t)),0);
    const cin={}, cout={};
    inRange.forEach(t=>{const c=cashOf(t); if(t.direction==='in')cin[t.account_code]=(cin[t.account_code]||0)+c; else cout[t.account_code]=(cout[t.account_code]||0)+c;});
    const inT=Object.values(cin).reduce((a,b)=>a+b,0), outT=Object.values(cout).reduce((a,b)=>a+b,0);
    rows.push({label:'Opening cash',value:opening,bold:true}); csv.push(['Opening cash',opening],[]);
    rows.push({head:true,label:'CASH IN'}); csv.push(['CASH IN']);
    Object.keys(cin).sort().forEach(c=>{rows.push({label:accNm(c),value:cin[c]});csv.push([accNm(c),cin[c]]);});
    rows.push({label:'Total cash in',value:inT,bold:true}); csv.push(['Total cash in',inT],[]);
    rows.push({head:true,label:'CASH OUT'}); csv.push(['CASH OUT']);
    Object.keys(cout).sort().forEach(c=>{rows.push({label:accNm(c),value:cout[c]});csv.push([accNm(c),cout[c]]);});
    rows.push({label:'Total cash out',value:outT,bold:true}); csv.push(['Total cash out',outT],[]);
    rows.push({label:'Net movement',value:inT-outT,bold:true}); csv.push(['Net movement',inT-outT]);
    rows.push({label:'CLOSING CASH',value:opening+inT-outT,bold:true}); csv.push(['CLOSING CASH',opening+inT-outT]);
  } else {
    LAST_TITLE='Mindora Tax Summary';
    const vatOut=inRange.filter(t=>t.direction==='in').reduce((a,t)=>a+Number(t.vat_amount||0),0);
    const vatIn=inRange.filter(t=>t.direction==='out').reduce((a,t)=>a+Number(t.vat_amount||0),0);
    const vatRemit=inRange.filter(t=>t.direction==='out'&&t.account_code==='2200').reduce((a,t)=>a+Number(t.gross_amount||0),0);
    const whtWith=inRange.filter(t=>t.direction==='out').reduce((a,t)=>a+Number(t.wht_amount||0),0);
    const whtRemit=inRange.filter(t=>t.direction==='out'&&t.account_code==='2300').reduce((a,t)=>a+Number(t.gross_amount||0),0);
    const whtRec=inRange.filter(t=>t.direction==='in').reduce((a,t)=>a+Number(t.wht_amount||0),0);
    rows.push({head:true,label:'VAT'});
    rows.push({label:'VAT collected on sales (output)',value:vatOut});
    rows.push({label:'VAT paid on purchases (input)',value:vatIn});
    rows.push({label:'VAT remitted to URA',value:vatRemit});
    rows.push({label:'Net VAT due to URA',value:vatOut-vatIn-vatRemit,bold:true});
    rows.push({head:true,label:'WITHHOLDING TAX'});
    rows.push({label:'WHT you withheld',value:whtWith});
    rows.push({label:'WHT remitted to URA',value:whtRemit});
    rows.push({label:'WHT due to URA',value:whtWith-whtRemit,bold:true});
    rows.push({label:'WHT withheld from you (credit)',value:whtRec});
    csv.push(['VAT output',vatOut],['VAT input',vatIn],['VAT remitted',vatRemit],['Net VAT due',vatOut-vatIn-vatRemit],[],
      ['WHT withheld',whtWith],['WHT remitted',whtRemit],['WHT due',whtWith-whtRemit],['WHT receivable',whtRec]);
  }
  LAST_CSV=csv;
  $('#reportBody').innerHTML=`<div style="font-weight:700;font-size:15px;margin-bottom:2px">${escapeHtml(LAST_TITLE)}</div>
    <div class="row-sub" style="margin-bottom:10px">${LAST_PERIOD}</div>${rowsToTable(rows)}`;
}
function downloadCSV(name,rows){
  const csv=rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function printReport(){
  const body=$('#reportBody'); if(!body)return;
  const w=window.open('','_blank');
  if(!w){toast('Allow pop-ups to print/save PDF, or use Download CSV.',true);return;}
  w.document.write(`<html><head><title>${escapeHtml(LAST_TITLE)}</title><style>
    body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;padding:32px;max-width:720px;margin:auto}
    h1{color:#6C3483;margin:0;font-size:20px}.lh{border-bottom:3px solid #6C3483;padding-bottom:10px;margin-bottom:6px}
    .muted{color:#666;font-size:12px;margin-top:4px}table{width:100%;border-collapse:collapse}
  </style></head><body>
    <div class="lh"><h1>Mindora Inclusive Child Development Services Co. Ltd</h1>
    <div class="muted">Kisaasi / Kikaya, Kampala · mindoraicds@gmail.com · 0741 397 167</div></div>
    ${body.innerHTML}
    <p class="muted" style="margin-top:22px">Generated ${fmtDate(isoD(new Date()))} · Director-approved figures · UGX</p>
    </body></html>`);
  w.document.close(); w.focus();
  setTimeout(()=>{ try{ w.print(); }catch(e){} },350);
}
